<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <title>Detalhes da Missão</title>
    <style>
        body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: #f5f7fa;
    margin: 0;
    padding: 40px;
    color: #1f2937;
}

h1 {
    text-align: center;
    margin-bottom: 25px;
    font-weight: 600;
}

div {
    background-color: white;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    padding: 24px;
    max-width: 600px;
    margin: auto;
}

h2 {
    margin-bottom: 10px;
}

p {
    font-size: 0.95rem;
    color: #4b5563;
    margin: 6px 0;
}

h3 {
    margin-top: 20px;
    margin-bottom: 10px;
    font-size: 1rem;
}

table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 10px;
}

th {
    text-align: left;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: #6b7280;
    padding: 10px;
    background: #f9fafb;
}

td {
    padding: 12px 10px;
    border-top: 1px solid #e5e7eb;
    font-size: 0.9rem;
}

tr:hover {
    background-color: #f9fafb;
}

/* Botão voltar */
#voltar {
    display: block;
    width: fit-content;
    margin: 25px auto 0;
    padding: 8px 16px;
    font-size: 0.85rem;
    font-weight: 500;
    text-decoration: none;
    background: #e5e7eb;
    color: #1f2937;
    border-radius: 8px;
    transition: 0.2s;
}

#voltar:hover {
    background: #d1d5db;
}

.ninja{
    text-decoration: none;
    font-size: 0.85rem;
    font-weight: 500;
    display: block;
    color: #1f2937;
}
    </style>
</head>
<body>
<h1>Detalhes da Missão</h1>
<div>
    <h2><span th:text="${missao.nome + ' - Número ' + missao.id}"></span></h2>
    <p><strong>Rank:</strong> <span th:text="${missao.rank}"></span></p>

    <h3>Ninjas:</h3>
    <table>
        <thead>
        <tr>
            <th>Nome</th>
            <th>Rank</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="ninja : ${missao.ninjas}">
            <td><a class="ninja" th:text="${ninja.nome}" th:href="@{/ninjas/ui/detalhar/{id}(id=${ninja.id})}"></a></td>
            <td th:text="${ninja.rank}"></td>
        </tr>
        </tbody>
    </table>
</div>
<a id="voltar" href="/missoes/ui/listar">Voltar para a lista de missões</a>
</body>
</html>
