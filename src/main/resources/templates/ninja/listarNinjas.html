<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tabela de Ninjas</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f5f7fa;
            margin: 0;
            padding: 40px;
            color: #1f2937;
        }

        main {
            max-width: 1000px;
            margin: auto;
            background: white;
            padding: 24px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        h1 {
            margin-bottom: 20px;
            font-size: 1.6rem;
            font-weight: 600;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: #f9fafb;
        }

        th {
            text-align: left;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #6b7280;
            padding: 12px;
        }

        td {
            padding: 14px 12px;
            border-top: 1px solid #e5e7eb;
            font-size: 0.95rem;
        }

        tbody tr:hover {
            background: #f9fafb;
        }

        /* Botões */
        a {
    display: inline-block;
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 0.8rem;
    font-weight: 500;
    text-decoration: none;
    background: #e5e7eb;
    color: #1f2937;
    transition: 0.2s;
}

a:hover {
    background: #d1d5db;
}

/* Deletar */
a:last-child {
    background: #fee2e2;
    color: #b91c1c;
}

a:last-child:hover {
    background: #fecaca;
}

#green{
background: #72d486;
color: #e0ffe7;
}

        /* Responsivo leve */
        @media (max-width: 768px) {
            body {
                padding: 20px;
            }

            td {
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>

<main>
    <div th:if="${mensagem}" class="mensagem" th:text="${mensagem}"></div>
    <h1>Lista de Ninjas</h1>
    <a th:href="@{/ninjas/ui/adicionar}" id="green">Adicionar Ninja</a>
    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Idade</th>
            <th>Email</th>
            <th>Rank</th>
            <th>Missões</th>
            <th>Ações</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="ninja: ${ninjas}">
            <td data-label="ID" th:text="${ninja.id}"></td>
            <td data-label="Nome" th:text="${ninja.nome}"></td>
            <td data-label="Idade" th:text="${ninja.idade}"></td>
            <td data-label="Email" th:text="${ninja.email}"></td>
            <td data-label="Rank" th:text="${ninja.rank}"></td>

            <td data-label="Missões">
        <span th:if="${ninja.missoes}">
            Nome: <span th:text="${ninja.missoes.nome}"></span>,
            Dificuldade: <span th:text="${ninja.missoes.rank}"></span>
        </span>
                <span th:if="${ninja.missoes} == null">Sem missões</span>
            </td>

            <td data-label="Ações">
                <a th:href="@{/ninjas/ui/detalhar/{id}(id=${ninja.id})}">Ver Detalhes</a>
                <a th:href="@{/ninjas/ui/#/{id}(id=${ninja.id})}">Alterar</a>
                <a th:href="@{/ninjas/ui/deletar/{id}(id=${ninja.id})}">Deletar</a>
            </td>
        </tr>
        </tbody>
    </table>
</main>

</body>
</html>
