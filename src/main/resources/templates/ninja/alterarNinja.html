<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
  <title>Alterar Ninja</title>
  <link rel="stylesheet" th:href="@{/css/styles.css}" />
  <style>
    body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background-color: #f5f7fa;
    margin: 0;
    padding: 40px;
    color: #1f2937;
}

h1 {
    text-align: center;
    margin-bottom: 25px;
    font-weight: 600;
}

.form-container {
    background-color: white;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
    padding: 24px;
    max-width: 420px;
    margin: auto;
}

label {
    display: block;
    margin: 12px 0 5px;
    font-size: 0.85rem;
    color: #6b7280;
}

input {
    width: 100%;
    padding: 10px;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    font-size: 0.9rem;
    transition: 0.2s;
}

input:focus {
    outline: none;
    border-color: #2563eb;
    box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.1);
}

/* Botão principal */
button {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    border: none;
    border-radius: 8px;
    background: #2563eb;
    color: white;
    font-size: 0.9rem;
    font-weight: 500;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    background: #1d4ed8;
}

/* Mensagem */
.mensagem {
    background: #ecfdf5;
    color: #065f46;
    padding: 10px;
    border-radius: 8px;
    font-size: 0.85rem;
    text-align: center;
    margin-bottom: 15px;
}

/* Link voltar */
a {
    display: block;
    margin-top: 15px;
    text-align: center;
    font-size: 0.85rem;
    text-decoration: none;
    color: #2563eb;
    transition: 0.2s;
}

a:hover {
    text-decoration: underline;
}
  </style>
</head>
<body>
<h1>Alterar Ninja</h1>

<div class="form-container">
  <div th:if="${mensagem}" class="mensagem" th:text="${mensagem}"></div>

  <form th:action="@{/ninjas/ui/patch}" th:object="${ninjaPatch}" method="post">
    <input type="hidden" name="_method" value="patch"/>
    <input type="hidden" th:field="*{id}" />


    <label for="nome">Nome:</label>
    <input type="text" id="nome" th:field="*{nome}" required />

    <label for="email">Email:</label>
    <input type="email" id="email" th:field="*{email}" required />

    <label for="idade">Idade:</label>
    <input type="number" id="idade" th:field="*{idade}" required />

    <label for="rank">Rank:</label>
    <input type="text" id="rank" th:field="*{rank}" />

    <button type="submit">Alterar Ninja</button>
  </form>

  <a th:href="@{/ninjas/ui/listar}">Voltar para a lista de ninjas</a>
</div>
</body>
</html>
