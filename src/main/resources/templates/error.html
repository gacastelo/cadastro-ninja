<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ops! Algo deu errado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #f8f9fa;
            color: #333;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .container {
            max-width: 500px;
            padding: 40px;
            text-align: center;
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .icon-box {
            background: #fff5f2;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #1a1a1a;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: #666;
            margin-bottom: 32px;
        }

        .error-code {
            display: inline-block;
            padding: 4px 12px;
            background: #eee;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 600;
            color: #888;
            margin-bottom: 24px;
        }

        .btn {
            display: inline-block;
            background-color: #ff4500;
            color: white;
            padding: 14px 28px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 15px;
            transition: transform 0.2s, background 0.2s;
        }

        .btn:hover {
            background-color: #e63e00;
            transform: translateY(-1px);
        }

        .footer-text {
            margin-top: 40px;
            font-size: 12px;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<div class="container">

    <div class="error-code">
        Status <span th:text="${status}">500</span>
    </div>

    <h1>Missão Interrompida</h1>

    <p>Parece que houve um erro na execução do sistema. O ninja responsável já foi notificado (ou está tomando café).</p>

    <a href="/" class="btn">Voltar para o Início</a>

    <div class="footer-text">
        Sistema de Cadastro de Ninjas
    </div>
</div>

</body>
</html>
